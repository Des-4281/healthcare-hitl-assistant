name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v6

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: Des-4281/healthcare-hitl-assistant
          huggingface_repo_id: desolo-2918/healthcare-hitl-assistant
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: gradio